<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄羅斯方塊拼圖求解器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 Babel (用於直接在瀏覽器解析 JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Lucide 圖標庫 -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-gray-950">
    <div id="root"></div>

    <script type="text/babel">
        // 修正：從全域物件正確提取 LucideReact 組件
        const { useState, useEffect, useRef, useCallback } = React;
        
        // 確保在 CDN 模式下正確獲取圖標組件
        const { 
          Play, 
          Square, 
          AlertTriangle, 
          CheckCircle, 
          Info, 
          RefreshCw 
        } = window.LucideReact || {};

        const PIECE_DEFINITIONS = {
          T: [[0, 0], [0, 1], [0, 2], [1, 1]],
          I: [[0, 0], [0, 1], [0, 2], [0, 3]],
          O: [[0, 0], [0, 1], [1, 0], [1, 1]],
          L: [[0, 0], [1, 0], [2, 0], [2, 1]],
          J: [[0, 1], [1, 1], [2, 1], [2, 0]]
        };

        const PIECE_COLORS = {
          T: 'bg-purple-600',
          I: 'bg-cyan-600',
          O: 'bg-amber-600',
          L: 'bg-orange-600',
          J: 'bg-blue-600',
          empty: 'bg-gray-900'
        };

        const App = () => {
          const [rows, setRows] = useState(8);
          const [cols, setCols] = useState(7);
          const [pieceCounts, setPieceCounts] = useState({ T: 4, I: 3, O: 2, L: 4, J: 1 });
          const [board, setBoard] = useState([]);
          const [isSolving, setIsSolving] = useState(false);
          const [status, setStatus] = useState({ type: 'ready', message: '準備就緒' });
          const [iterations, setIterations] = useState(0);
          const stopRef = useRef(false);

          useEffect(() => {
            const emptyBoard = Array.from({ length: rows }, () => Array(cols).fill(0));
            setBoard(emptyBoard);
            validate(rows, cols, pieceCounts);
          }, [rows, cols]);

          const validate = (r, c, counts) => {
            const needed = r * c;
            const total = Object.values(counts).reduce((a, b) => a + b, 0) * 4;
            const tCount = counts.T;
            if (total !== needed) {
              setStatus({ type: 'error', message: `面積不符 (差 ${needed - total} 格)` });
              return false;
            }
            if (tCount % 2 !== 0) {
              setStatus({ type: 'error', message: `數學預判無解：T 型必須為偶數個` });
              return false;
            }
            setStatus({ type: 'ok', message: `✅ 參數符合數學基本條件` });
            return true;
          };

          const handleCountChange = (type, delta) => {
            if (isSolving) return;
            const newCounts = { ...pieceCounts, [type]: Math.max(0, pieceCounts[type] + delta) };
            setPieceCounts(newCounts);
            validate(rows, cols, newCounts);
          };

          const getRotations = (shape) => {
            const rotate = (s) => s.map(([r, c]) => [c, -r]);
            const normalize = (s) => {
              const minR = Math.min(...s.map(([r]) => r));
              const minC = Math.min(...s.map(([, c]) => c));
              return s.map(([r, c]) => [r - minR, c - minC]).sort((a, b) => a[0] - b[0] || a[1] - b[1]);
            };
            const unique = []; const seen = new Set(); let curr = shape;
            for (let i = 0; i < 4; i++) {
              curr = normalize(curr);
              const key = JSON.stringify(curr);
              if (!seen.has(key)) { seen.add(key); unique.push(curr); }
              curr = rotate(curr);
            }
            return unique;
          };

          const canPlace = (currBoard, shape, r, c) => {
            for (const [dr, dc] of shape) {
              const nr = r + dr, nc = c + dc;
              if (nr < 0 || nr >= rows || nc < 0 || nc >= cols || currBoard[nr][nc] !== 0) return false;
            }
            return true;
          };

          const placePiece = (currBoard, shape, r, c, val) => {
            for (const [dr, dc] of shape) currBoard[r + dr][c + dc] = val;
          };

          const startSolving = async () => {
            if (!validate(rows, cols, pieceCounts)) return;
            setIsSolving(true);
            stopRef.current = false;
            let localIterations = 0;
            const rotationsCache = {};
            Object.keys(PIECE_DEFINITIONS).forEach(k => rotationsCache[k] = getRotations(PIECE_DEFINITIONS[k]));
            const workingBoard = Array.from({ length: rows }, () => Array(cols).fill(0));
            const counts = { ...pieceCounts };
            const usedCounts = { T: 0, I: 0, O: 0, L: 0, J: 0 };

            const solve = async (b) => {
              if (stopRef.current) return false;
              localIterations++;
              if (localIterations % 10000 === 0) {
                setIterations(localIterations);
                await new Promise(r => setTimeout(r, 0));
              }
              let row = -1, col = -1;
              findEmpty: for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                  if (b[r][c] === 0) { row = r; col = c; break findEmpty; }
                }
              }
              if (row === -1) return true;
              for (const type in counts) {
                if (counts[type] <= 0) continue;
                for (const shape of rotationsCache[type]) {
                  for (const [dr, dc] of shape) {
                    const startR = row - dr, startC = col - dc;
                    if (canPlace(b, shape, startR, startC)) {
                      const pieceId = `${type}_${type}${usedCounts[type] + 1}`;
                      placePiece(b, shape, startR, startC, pieceId);
                      counts[type]--; usedCounts[type]++;
                      if (await solve(b)) return true;
                      usedCounts[type]--; counts[type]++;
                      placePiece(b, shape, startR, startC, 0);
                    }
                  }
                }
              }
              return false;
            };

            const startTime = Date.now();
            const result = await solve(workingBoard);
            const endTime = Date.now();
            if (!stopRef.current) {
              if (result) {
                setBoard(workingBoard);
                setStatus({ type: 'success', message: `找到解法！耗時 ${((endTime - startTime)/1000).toFixed(2)}s` });
              } else {
                setStatus({ type: 'error', message: `遍歷完畢，此組合無解` });
              }
            }
            setIsSolving(false);
          };

          const getCellBorders = (r, c) => {
            const pieceId = board[r][c];
            if (!pieceId) return "";
            let borders = "";
            if (r === 0 || board[r - 1][c] !== pieceId) borders += " border-t-[3px] border-t-black";
            if (r === rows - 1 || board[r + 1][c] !== pieceId) borders += " border-b-[3px] border-b-black";
            if (c === 0 || board[r][c - 1] !== pieceId) borders += " border-l-[3px] border-l-black";
            if (c === cols - 1 || board[r][c + 1] !== pieceId) borders += " border-r-[3px] border-r-black";
            return borders;
          };

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 p-6 font-sans">
              <div className="max-w-5xl mx-auto">
                <header className="text-center mb-10">
                  <h1 className="text-4xl font-extrabold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent inline-block">
                    Tetris Puzzle Solver
                  </h1>
                </header>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                  <div className="lg:col-span-4 space-y-6">
                    <div className="bg-gray-900 border border-gray-800 rounded-3xl p-6 shadow-2xl">
                      <h2 className="flex items-center text-lg font-bold mb-4">
                        {Square && <Square className="w-5 h-5 mr-2 text-blue-400" />} 矩陣設定
                      </h2>
                      <div className="grid grid-cols-2 gap-4 mb-6">
                        <div>
                          <label className="text-xs text-gray-500 uppercase font-bold tracking-wider">Rows</label>
                          <input type="number" value={rows} onChange={e => setRows(Number(e.target.value))} className="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" />
                        </div>
                        <div>
                          <label className="text-xs text-gray-500 uppercase font-bold tracking-wider">Cols</label>
                          <input type="number" value={cols} onChange={e => setCols(Number(e.target.value))} className="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" />
                        </div>
                      </div>

                      <h2 className="flex items-center text-lg font-bold mb-4">
                        {RefreshCw && <RefreshCw className="w-5 h-5 mr-2 text-purple-400" />} 方塊庫存
                      </h2>
                      <div className="space-y-2">
                        {Object.entries(pieceCounts).map(([type, count]) => (
                          <div key={type} className="flex items-center justify-between bg-gray-800/50 p-3 rounded-xl border border-gray-700/50">
                            <div className="flex items-center">
                              <div className={`w-4 h-4 rounded-sm ${PIECE_COLORS[type]} mr-3 shadow-sm border border-black/20`}></div>
                              <span className="font-bold">{type} 型</span>
                            </div>
                            <div className="flex items-center gap-3">
                              <button onClick={() => handleCountChange(type, -1)} className="w-8 h-8 flex items-center justify-center bg-gray-700 rounded-lg hover:bg-gray-600">-</button>
                              <span className="w-6 text-center font-mono font-bold text-blue-400">{count}</span>
                              <button onClick={() => handleCountChange(type, 1)} className="w-8 h-8 flex items-center justify-center bg-gray-700 rounded-lg hover:bg-gray-600">+</button>
                            </div>
                          </div>
                        ))}
                      </div>

                      <div className="mt-8 pt-6 border-t border-gray-800">
                        <div className={`flex items-center justify-center p-4 rounded-2xl mb-4 text-sm font-medium ${status.type === 'error' ? 'bg-red-500/10 text-red-400' : status.type === 'success' ? 'bg-green-500/10 text-green-400' : 'bg-blue-500/10 text-blue-400'}`}>
                          {status.message}
                        </div>
                        <button onClick={isSolving ? () => stopRef.current = true : startSolving} disabled={status.type === 'error' && !isSolving} className={`w-full py-4 rounded-2xl font-bold flex items-center justify-center shadow-xl text-white ${isSolving ? 'bg-red-600' : 'bg-blue-600 hover:bg-blue-500 disabled:bg-gray-800'}`}>
                          {isSolving ? '停止運算' : '開始求解'}
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="lg:col-span-8 flex flex-col items-center justify-center bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl min-h-[500px]">
                    <div className="grid bg-black p-2 rounded-lg border-8 border-gray-800" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))`, width: '100%', maxWidth: `${cols * 50}px` }}>
                      {board.map((row, r) => row.map((cell, c) => {
                        const type = cell ? cell.split('_')[0] : 'empty';
                        return (
                          <div key={`${r}-${c}`} className={`aspect-square relative flex items-center justify-center text-[8px] font-black ${PIECE_COLORS[type]} ${getCellBorders(r, c)}`}>
                            {cell ? <span className="opacity-40">{cell.split('_')[1]}</span> : null}
                            {cell && <div className="absolute inset-[2px] border-t border-l border-white/20 pointer-events-none" />}
                          </div>
                        );
                      }))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
